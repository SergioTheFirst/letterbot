<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{{ static_url }}">
</head>
<body>
  <header class="navbar">
    <div class="brand">{{ title }}</div>
    <nav>
      <a href="{{ latency_url }}">Latency</a>
      <a href="{{ health_url }}">Health</a>
      <a href="{{ attention_url }}">Attention</a>
      <a href="{{ events_url }}" class="active">Events</a>
      <a href="{{ relationships_url }}">Relationships</a>
    </nav>
  </header>
  <main class="container">
    {{ error_block }}
    <section class="filters">
      <form method="get" action="{{ events_url }}" class="filter-form">
        <div class="form-group">
          <label for="account_email">Account</label>
          <select id="account_email" name="account_email">{{ account_options }}</select>
        </div>
        <div class="form-group">
          <label for="account_emails">Scope (comma-separated)</label>
          <input id="account_emails" name="account_emails" type="text" value="{{ account_emails_value }}" placeholder="optional, comma separated">
        </div>
        <div class="form-group">
          <label for="window_days">Window</label>
          <select id="window_days" name="window_days">{{ window_options }}</select>
        </div>
        <div class="form-group">
          <label for="limit">Limit</label>
          <select id="limit" name="limit">
            <option value="50"{% if limit_value == '50' %} selected{% endif %}>50</option>
            <option value="200"{% if limit_value == '200' %} selected{% endif %}>200</option>
            <option value="500"{% if limit_value == '500' %} selected{% endif %}>500</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="submit">Apply</button>
        </div>
      </form>
    </section>

    <section>
      <h2>Events timeline</h2>
      {{ events_block }}
    </section>
  </main>
</body>
</html>
