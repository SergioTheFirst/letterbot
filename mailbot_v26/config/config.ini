[general]
check_interval = 120
max_email_mb = 15
max_attachment_mb = 15
max_zip_uncompressed_mb = 80
max_extracted_chars = 50000
max_extracted_total_chars = 120000
admin_chat_id =

[storage]
db_path = data/mailbot.sqlite

[llm]
primary = cloudflare
fallback = cloudflare

[gigachat]
enabled = true
api_key = CHANGE_ME

[cloudflare]
enabled = true

[llm_safety]
gigachat_max_consecutive_errors = 3
gigachat_max_latency_sec = 10
gigachat_cooldown_sec = 600

[features]
enable_daily_digest = true
enable_weekly_digest = false
enable_anomaly_alerts = false
enable_attention_economics = false
enable_hierarchical_mail_types = false
enable_priority_v2 = true
enable_narrative_binding = true
enable_narrative_patterns = true

[daily_digest]
hour = 9
minute = 0

[weekly_digest]
weekday = mon
hour = 9
minute = 0

[trust]
half_life_days = 90
weight_commitment = 0.5
weight_response = 0.3
weight_trend = 0.2
max_response_stddev_hours = 72
min_response_samples = 2
min_trend_samples = 2

[vip_senders]
; exact emails or prefixes/domains enabled for VIP scoring
; legal@ = true
; @partner.com = true
; vip@example.com = true

[priority_v2]
urgency_weight_default = 12
urgency_weight_by_type = 30
amount_base_points = 5
amount_10k_points = 10
amount_50k_points = 20
amount_100k_points = 30
deadline_1d_points = 30
deadline_3d_points = 20
deadline_7d_points = 10
type_invoice_final_points = 25
type_reminder_escalation_points = 22
type_contract_termination_points = 20
type_claim_points = 20
vip_base_score = 20
vip_multiplier_fyi = 0.3
vip_multiplier_freq = 0.5
vip_multiplier_commitment = 1.5
vip_multiplier_min = 0.2
vip_multiplier_max = 2.0
freq_spike_threshold = 3.0
freq_spike_points = 15
chain_two_points = 10
chain_three_points = 25
priority_red_threshold = 70
priority_yellow_threshold = 35
