[general]
check_interval = 120
max_email_mb = 15
max_attachment_mb = 15
max_zip_uncompressed_mb = 80
max_extracted_chars = 50000
max_extracted_total_chars = 120000
admin_chat_id =

[storage]
db_path = data/mailbot.sqlite

[llm]
primary = cloudflare
fallback = cloudflare

[gigachat]
enabled = true
api_key = CHANGE_ME

[cloudflare]
enabled = true

[llm_safety]
gigachat_max_consecutive_errors = 3
gigachat_max_latency_sec = 10
gigachat_cooldown_sec = 600

[ui]
locale = ru

[features]
enable_auto_priority = false
enable_daily_digest = true
enable_weekly_digest = false
enable_weekly_accuracy_report = false
enable_digest_insights = false
enable_digest_action_templates = false
enable_anomaly_alerts = false
enable_attention_economics = false
enable_quality_metrics = false
enable_hierarchical_mail_types = false
enable_priority_v2 = true
enable_narrative_binding = true
enable_narrative_patterns = true
enable_circadian_delivery = true
enable_flow_protection = false
enable_attention_debt = true
enable_surprise_budget = true
enable_silence_as_signal = shadow
enable_deadlock_detection = shadow
enable_premium_processor = false
enable_behavior_metrics_digest = false
enable_trust_bootstrap = false

[daily_digest]
hour = 9
minute = 0

[weekly_digest]
weekday = mon
hour = 9
minute = 0

[digest_insights]
window_days = 7
max_items = 3

[behavior_metrics_digest]
window_days = 7

[trust_bootstrap]
learning_days = 14
min_samples = 50
max_allowed_surprise_rate = 0.30
hide_action_templates_until_ready = true

[delivery_policy]
night_hours = 21-7
immediate_value_threshold = 60
batch_value_threshold = 20
critical_risk_threshold = 80
max_immediate_per_hour = 5

[flow_protection]
focus_hours = 9-12

[auto_priority_gate]
enabled = false
window_days = 30
min_samples = 30
max_correction_rate = 0.15
cooldown_hours = 24

[deadlock_policy]
window_days = 5
min_messages = 10
cooldown_hours = 24
max_per_run = 20

[silence_policy]
lookback_days = 60
min_messages = 6
silence_factor = 3.0
min_silence_days = 7
cooldown_hours = 72
max_per_run = 20

[trust]
half_life_days = 90
weight_commitment = 0.5
weight_response = 0.3
weight_trend = 0.2
max_response_stddev_hours = 72
min_response_samples = 2
min_trend_samples = 2

[vip_senders]
; exact emails or prefixes/domains enabled for VIP scoring
; legal@ = true
; @partner.com = true
; vip@example.com = true

[priority_v2]
urgency_weight_default = 12
urgency_weight_by_type = 30
amount_base_points = 5
amount_10k_points = 10
amount_50k_points = 20
amount_100k_points = 30
deadline_1d_points = 30
deadline_3d_points = 20
deadline_7d_points = 10
type_invoice_final_points = 25
type_reminder_escalation_points = 22
type_contract_termination_points = 20
type_claim_points = 20
vip_base_score = 20
vip_multiplier_fyi = 0.3
vip_multiplier_freq = 0.5
vip_multiplier_commitment = 1.5
vip_multiplier_min = 0.2
vip_multiplier_max = 2.0
freq_spike_threshold = 3.0
freq_spike_points = 15
chain_two_points = 10
chain_three_points = 25
priority_red_threshold = 70
priority_yellow_threshold = 35
