<div class="status-strip-row">
  <div class="status-item">
    <span class="label">Mode</span>
    <span class="badge muted">{{ status_strip.system_mode }}</span>
  </div>
  <div class="status-item">
    <span class="label">IMAP</span>
    <span class="badge {{ status_strip.imap.class }}">{{ status_strip.imap.text }}</span>
  </div>
  <div class="status-item">
    <span class="label">LLM</span>
    <span class="badge {{ status_strip.llm.class }}">{{ status_strip.llm.text }}</span>
  </div>
  <div class="status-item">
    <span class="label">TG</span>
    <span class="badge {{ status_strip.telegram.class }}">{{ status_strip.telegram.text }}</span>
  </div>
  <div class="status-item">
    <span class="label">DB</span>
    <span class="badge {{ status_strip.db.class }}">{{ status_strip.db.text }}</span>
    <span class="status-meta">{{ status_strip.db_size }}</span>
  </div>
  <div class="status-item status-updated">
    <span class="label">Updated</span>
    <span class="status-meta">{{ status_strip.updated_ago }}</span>
  </div>
</div>
