name: Release Smoke

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  windows-release-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Create build venv
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -r requirements.txt
          .\.venv\Scripts\python -m pip install -r requirements-build.txt

      - name: Build one-folder release
        run: cmd /c build_windows_onefolder.bat

      - name: Verify release contract
        run: cmd /c verify_dist.bat

      - name: Smoke-check release contents
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\\Letterbot\\run.bat")) {
            throw "dist\\Letterbot\\run.bat missing"
          }
          .\.venv\Scripts\python -m mailbot_v26.tools.verify_dist dist\Letterbot

      - name: Package smoke artifact
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
        run: powershell Compress-Archive dist/Letterbot dist/Letterbot.zip

      - name: Upload smoke artifact
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: Letterbot-windows-onefolder-smoke
          path: dist/Letterbot.zip
          retention-days: 7
