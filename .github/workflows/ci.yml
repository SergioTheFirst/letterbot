name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile
        run: python -m compileall mailbot_v26

      - name: Run tests
        run: python -m pytest -q

      - name: Show version & entrypoint
        run: python -c "import sys; print(sys.version); import mailbot_v26; print('IMPORT_OK')"

      - name: Fail if working tree dirty
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Working tree dirty after tests."
            git status --porcelain
            exit 1
          fi

  build_windows:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-build.txt

      - name: Build one-folder release
        run: cmd /c build_windows_onefolder.bat

      - name: Package release
        run: powershell Compress-Archive dist/MailBot dist/MailBot.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MailBot-windows-onefolder
          path: dist/MailBot.zip
          retention-days: 7
