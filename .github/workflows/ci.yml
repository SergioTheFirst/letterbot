name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall mailbot_v26 -q

      - name: Run full test suite
        run: python -m pytest mailbot_v26/tests/ -q --tb=short

      - name: Run golden corpus
        run: python -m mailbot_v26.tools.eval_golden_corpus

      - name: Run cleanup status
        run: python -m mailbot_v26.tools.cleanup --status

      - name: Show version & entrypoint
        run: python -c "import sys; print(sys.version); import mailbot_v26; print('IMPORT_OK')"

      - name: Fail if working tree dirty
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Working tree dirty after tests."
            git status --porcelain
            exit 1
          fi

  build_windows:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Create build venv
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -r requirements.txt
          .\.venv\Scripts\python -m pip install -r requirements-build.txt

      - name: Build one-folder release
        run: cmd /c build_windows_onefolder.bat

      - name: Verify one-folder release
        run: cmd /c verify_dist.bat

      - name: Package release
        run: powershell Compress-Archive dist/Letterbot dist/Letterbot.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Letterbot-windows-onefolder
          path: dist/Letterbot.zip
          retention-days: 7
